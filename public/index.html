<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>書摘思考站</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1714;--ink-mid:#3d3830;--ink-soft:#7a7268;
  --paper:#faf7f2;--paper-deep:#e8e0d0;
  --accent:#2b4f7a;--accent-light:#e8f0fa;--accent-glow:#4a7db5;
  --gold:#9a7c3a;--gold-light:#f5ecd5;--rule:#d4ccc0;
  --serif:'Noto Serif TC',serif;--sans:'Noto Sans TC',sans-serif;
}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);min-height:100vh;line-height:1.8}
header{background:var(--ink);padding:2rem 1rem 1.8rem;text-align:center;position:relative}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.eyebrow{font-size:11px;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;margin-bottom:.5rem}
h1{font-family:var(--serif);font-size:clamp(1.8rem,4vw,2.6rem);font-weight:300;color:#f5f0e8;letter-spacing:.08em}
h1 em{font-weight:700;font-style:normal;color:#fff}
.header-sub{font-size:12px;color:#7a7268;margin-top:.4rem}
main{max-width:820px;margin:0 auto;padding:2rem 1.2rem 4rem}
.input-card{background:#fff;border:1px solid var(--rule);border-radius:4px;padding:1.5rem;margin-bottom:2rem;box-shadow:0 2px 10px rgba(26,23,20,.05)}
.lbl{font-family:var(--serif);font-size:14px;color:var(--ink-mid);margin-bottom:.6rem;display:flex;align-items:center;gap:.5rem}
.tag{font-family:var(--sans);font-size:10px;background:var(--gold-light);color:var(--gold);border:1px solid #e0d0a8;padding:1px 7px;border-radius:2px}
textarea{width:100%;min-height:120px;border:1px solid var(--rule);border-radius:3px;padding:.9rem;font-family:var(--serif);font-size:15px;line-height:1.9;color:var(--ink);background:var(--paper);resize:vertical;outline:none;transition:border-color .2s}
textarea:focus{border-color:var(--accent-glow);background:#fff}
textarea::placeholder{color:var(--ink-soft)}
.hint{font-size:11px;color:var(--ink-soft);margin-top:.5rem}
.btn-row{display:flex;gap:.7rem;margin-top:1rem;align-items:center}
.btn-go{background:var(--accent);color:#fff;border:none;padding:.7rem 2rem;font-family:var(--sans);font-size:13px;font-weight:500;letter-spacing:.05em;border-radius:3px;cursor:pointer;transition:background .2s}
.btn-go:hover{background:var(--accent-glow)}
.btn-go:disabled{background:#a8b4c0;cursor:not-allowed}
.btn-clr{background:transparent;color:var(--ink-soft);border:1px solid var(--rule);padding:.7rem 1rem;font-size:12px;border-radius:3px;cursor:pointer;transition:all .2s}
.btn-clr:hover{border-color:var(--ink-mid);color:var(--ink-mid)}
.loading{text-align:center;padding:2.5rem 1rem;display:none}
.loading.on{display:block}
.bars{display:inline-flex;gap:4px;margin-bottom:.8rem}
.bar{width:4px;height:28px;background:var(--accent);border-radius:2px;animation:wave 1.1s ease-in-out infinite}
.bar:nth-child(1){animation-delay:0s}.bar:nth-child(2){animation-delay:.15s}.bar:nth-child(3){animation-delay:.3s}.bar:nth-child(4){animation-delay:.45s}.bar:nth-child(5){animation-delay:.6s}
@keyframes wave{0%,100%{transform:scaleY(.4);opacity:.4}50%{transform:scaleY(1);opacity:1}}
.ltxt{font-family:var(--serif);font-size:14px;color:var(--ink-soft);letter-spacing:.05em}
.lsub{font-size:11px;color:#b0a898;margin-top:.3rem}
.err{background:#fdf0f0;border:1px solid #f0c0c0;border-radius:3px;padding:.9rem 1.1rem;color:#8b2020;font-size:13px;display:none;margin-bottom:1.2rem;line-height:1.6}
.err.on{display:block}
#results{display:none}
#results.on{display:block}
.rh{display:flex;align-items:baseline;justify-content:space-between;border-bottom:2px solid var(--ink);padding-bottom:.4rem;margin-bottom:1.6rem}
.rtitle{font-family:var(--serif);font-size:12px;letter-spacing:.1em;color:var(--ink-soft);text-transform:uppercase}
.rcnt{font-size:11px;color:var(--ink-soft)}
.book-card{background:#fff;border:1px solid var(--rule);border-radius:4px;margin-bottom:1.8rem;overflow:hidden;box-shadow:0 2px 6px rgba(26,23,20,.04)}
.bh{background:var(--ink);padding:1rem 1.3rem;display:flex;align-items:flex-start;gap:.8rem}
.bnum{font-family:var(--serif);font-size:10px;color:var(--gold);letter-spacing:.1em;padding-top:3px;white-space:nowrap}
.btw{flex:1}
.btitle{font-family:var(--serif);font-size:1.05rem;font-weight:500;color:#f5f0e8;line-height:1.4}
.bsub{font-size:11px;color:#7a7268;margin-top:.15rem}
.bb{padding:1.2rem}
.slbl{font-family:var(--sans);font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--ink-soft);border-bottom:1px solid var(--rule);padding-bottom:.3rem;margin-bottom:.8rem}
.ch{border-left:2px solid var(--paper-deep);padding:.6rem .8rem .6rem 1rem;margin-bottom:.7rem;background:var(--paper);border-radius:0 3px 3px 0}
.cname{font-family:var(--serif);font-size:13px;font-weight:500;color:var(--ink);margin-bottom:.2rem}
.csum{font-size:13px;color:var(--ink-mid);line-height:1.8}
hr.dv{border:none;border-top:1px dashed var(--rule);margin:1rem 0}
.qi{display:flex;gap:.6rem;align-items:flex-start;margin-bottom:.55rem}
.qm{font-family:var(--serif);font-size:16px;color:var(--gold);line-height:1.5;flex-shrink:0}
.qt{font-size:13px;color:var(--ink-mid);line-height:1.75;font-style:italic}
.ai{display:flex;gap:.6rem;align-items:flex-start;background:var(--accent-light);padding:.6rem .85rem;border-radius:3px;border-left:3px solid var(--accent);margin-bottom:.55rem}
.aico{font-size:13px;flex-shrink:0;margin-top:2px;color:var(--accent)}
.atxt{font-size:13px;color:var(--ink-mid);line-height:1.75}
.bf{border-top:1px solid var(--rule);padding:.6rem 1.2rem;background:var(--paper);display:flex;justify-content:flex-end}
.cpbtn{font-size:11px;color:var(--ink-soft);background:none;border:1px solid var(--rule);padding:3px 10px;border-radius:2px;cursor:pointer;transition:all .2s}
.cpbtn:hover{border-color:var(--ink-mid);color:var(--ink-mid)}
footer{text-align:center;padding:1.2rem;font-size:11px;color:#c0b8ae;border-top:1px solid var(--rule);font-family:var(--serif);letter-spacing:.05em}
</style>
</head>
<body>
<header>
  <div class="eyebrow">Book Insight Studio</div>
  <h1>書<em>摘</em>思考站</h1>
  <div class="header-sub">貼上書名，讓思考從閱讀開始</div>
</header>
<main>
  <div class="input-card">
    <div class="lbl">輸入書名清單 <span class="tag">每行一本</span></div>
    <textarea id="bookInput" placeholder="例如：
原子習慣
刻意練習
思考，快與慢
被討厭的勇氣"></textarea>
    <div class="hint">可同時輸入多本書，系統將分別生成章節重點、思考問題與生活應用。</div>
    <div class="btn-row">
      <button class="btn-go" id="analyzeBtn" onclick="go()">✦ 開始分析</button>
      <button class="btn-clr" onclick="clrAll()">清除</button>
    </div>
  </div>
  <div class="err" id="errBox"></div>
  <div class="loading" id="loadBox">
    <div class="bars">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div>
    </div>
    <div class="ltxt" id="ltxt">正在翻閱書頁…</div>
    <div class="lsub" id="lsub">這可能需要幾十秒</div>
  </div>
  <div id="results">
    <div class="rh">
      <span class="rtitle">分析結果</span>
      <span class="rcnt" id="rcnt"></span>
    </div>
    <div id="cards"></div>
  </div>
</main>
<footer>書摘思考站 · 由 Claude AI 驅動 · 閱讀是最安靜的革命</footer>
<script>
const phrases=[['正在翻閱書頁…','深入章節之中'],['提煉智慧精華…','跨越文字的邊界'],['尋找思考的問號…','讓問題引領我們'],['連結生活應用…','知識需要落地']];
let ltimer,booksData=[];
function startL(){let i=0;const t=document.getElementById('ltxt'),s=document.getElementById('lsub');ltimer=setInterval(()=>{i=(i+1)%phrases.length;t.textContent=phrases[i][0];s.textContent=phrases[i][1];},2500);}
function stopL(){clearInterval(ltimer);}
function showErr(m){const e=document.getElementById('errBox');e.innerHTML=m;e.classList.add('on');}
function clrErr(){document.getElementById('errBox').classList.remove('on');}
function clrAll(){document.getElementById('bookInput').value='';document.getElementById('results').classList.remove('on');clrErr();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
async function go(){
  const input=document.getElementById('bookInput').value.trim();
  if(!input){showErr('請先輸入至少一本書的書名。');return;}
  const books=input.split('\n').map(b=>b.trim()).filter(b=>b);
  if(!books.length){showErr('未偵測到有效書名。');return;}
  clrErr();
  document.getElementById('results').classList.remove('on');
  document.getElementById('loadBox').classList.add('on');
  document.getElementById('analyzeBtn').disabled=true;
  startL();
  const prompt=`你是一位博學的書評人與生命教練。請為以下書單中的每一本書提供深入的書摘分析。\n\n書單：\n${books.map((b,i)=>`${i+1}. ${b}`).join('\n')}\n\n請嚴格只輸出以下 JSON 格式，不得有任何前綴文字或 markdown 符號：\n\n{"books":[{"title":"書名","author":"作者","tagline":"一句話精華","chapters":[{"name":"章節名稱","summary":"重點2-3句"},{"name":"章節名稱","summary":"重點"},{"name":"章節名稱","summary":"重點"},{"name":"章節名稱","summary":"重點"}],"questions":["思考問題1？","思考問題2？","思考問題3？"],"applications":["生活應用1","生活應用2","生活應用3"]}]}\n\n要求：1.章節名稱貼近書的實際結構 2.思考問題引發深層反思 3.生活應用具體可操作 4.繁體中文 5.只輸出JSON`;
  try{
    const res=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:4000,messages:[{role:'user',content:prompt}]})});
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error||`伺服器錯誤(${res.status})`);}
    const data=await res.json();
    if(data.error)throw new Error(typeof data.error==='object'?data.error.message:data.error);
    let raw=data.content?.find(c=>c.type==='text')?.text||'';
    let parsed;
    try{const m=raw.match(/\{[\s\S]*\}/);parsed=JSON.parse(m?m[0]:raw);}
    catch(e){try{parsed=JSON.parse(raw.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim());}catch(e2){throw new Error('回應格式解析失敗，請重試。');}}
    stopL();document.getElementById('loadBox').classList.remove('on');render(parsed.books||[]);
  }catch(err){
    stopL();document.getElementById('loadBox').classList.remove('on');showErr('分析時發生錯誤：'+err.message);
  }finally{document.getElementById('analyzeBtn').disabled=false;}
}
function render(books){
  if(!books.length){showErr('未能取得分析結果，請重試。');return;}
  booksData=books;
  const c=document.getElementById('cards');c.innerHTML='';
  books.forEach((b,idx)=>{
    const d=document.createElement('div');d.className='book-card';
    d.innerHTML=`<div class="bh"><div class="bnum">No.${String(idx+1).padStart(2,'0')}</div><div class="btw"><div class="btitle">${esc(b.title)}</div><div class="bsub">${esc(b.author||'')}${b.tagline?' · '+esc(b.tagline):''}</div></div></div><div class="bb"><div class="slbl">章節重點</div>${(b.chapters||[]).map(ch=>`<div class="ch"><div class="cname">${esc(ch.name)}</div><div class="csum">${esc(ch.summary)}</div></div>`).join('')}<hr class="dv"><div class="slbl">值得思考的問題</div>${(b.questions||[]).map(q=>`<div class="qi"><span class="qm">？</span><span class="qt">${esc(q)}</span></div>`).join('')}<hr class="dv"><div class="slbl">應用在生活中</div>${(b.applications||[]).map((a,i)=>`<div class="ai"><span class="aico">${['◎','◈','◆'][i]||'▸'}</span><span class="atxt">${esc(a)}</span></div>`).join('')}</div><div class="bf"><button class="cpbtn" onclick="cp(this,${idx})">複製此書摘</button></div>`;
    c.appendChild(d);
  });
  document.getElementById('rcnt').textContent=`共 ${books.length} 本`;
  document.getElementById('results').classList.add('on');
  document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'});
}
function cp(btn,idx){
  const b=booksData[idx];if(!b)return;
  let t=`📚 ${b.title}\n`;if(b.author)t+=`作者：${b.author}\n`;if(b.tagline)t+=`精華：${b.tagline}\n\n`;
  t+=`【章節重點】\n`;(b.chapters||[]).forEach(c=>{t+=`▸ ${c.name}\n${c.summary}\n\n`;});
  t+=`【思考問題】\n`;(b.questions||[]).forEach(q=>{t+=`？ ${q}\n`;});
  t+=`\n【生活應用】\n`;(b.applications||[]).forEach(a=>{t+=`◎ ${a}\n`;});
  navigator.clipboard.writeText(t).then(()=>{const o=btn.textContent;btn.textContent='已複製 ✓';setTimeout(()=>{btn.textContent=o;},2000);});
}
document.getElementById('bookInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))go();});
</script>
</body>
</html>
